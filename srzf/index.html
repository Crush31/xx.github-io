<!doctype html>
<html lang="zh-CN"> <!-- 语言标签更规范 -->

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!-- 移动端视口优化：禁止缩放、适配设备宽度 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 解决移动端点击延迟问题 -->
    <meta name="touch-action" content="manipulation">
    <title>Happy Birthday</title>
    <!-- 确保CSS路径上传后正确，建议检查文件目录结构 -->
    <link rel="stylesheet" type="text/css" href="css/styles.css">
    <style>
        /* 重置默认样式，避免手机端边距问题 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden; /* 避免页面整体滚动 */
        }
        /* iframe容器适配，兼容所有手机浏览器 */
        #iframepage {
            width: 100vw; /* 占满设备宽度 */
            height: 100vh; /* 占满设备高度 */
            border: none;
            display: block; /* 消除默认inline带来的间隙 */
        }
        /* 全局滚动条隐藏（兼容多内核） */
        ::-webkit-scrollbar {
            display: none;
        }
        /* 兼容Firefox等非webkit浏览器 */
        scrollbar-width: none;
        -ms-overflow-style: none;
    </style>
</head>

<body>
    <!-- 简化iframe属性，通过JS自适应高度（解决手机端内容溢出） -->
    <iframe 
        src="./html/login.html" 
        id="iframepage" 
        frameborder="0" 
        onload="adjustFrameHeight()"
    ></iframe>

    <!-- 只保留一个jQuery版本（建议用较新的2.1.1，兼容移动端） -->
    <script src="js/jquery-2.1.1.min.js"></script>
    <script>
        // iframe高度自适应函数（适配手机端内容高度）
        function adjustFrameHeight() {
            const iframe = document.getElementById('iframepage');
            try {
                // 获取iframe内部文档的实际高度
                const innerHeight = iframe.contentWindow.document.body.scrollHeight;
                // 设置iframe高度为内部内容高度（也可固定为100vh，根据需求选）
                iframe.style.height = innerHeight + 'px';
            } catch (e) {
                // 跨域时降级为设备高度（若login.html和当前页面同域名则不会触发）
                iframe.style.height = '100vh';
                console.log('iframe高度自适应降级：', e);
            }
        }

        // 监听窗口大小变化（手机旋转时重新适配）
        window.addEventListener('resize', adjustFrameHeight);
    </script>
</body>

</html>
